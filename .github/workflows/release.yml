name: Publicar Release

on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      version:
        description: 'Versao (ex: 1.1.0)'
        required: true

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Rebuild native modules
        run: npx electron-rebuild -f -w better-sqlite3

      - name: Build
        run: npm run build

      - name: Generate token
        run: npx tsx scripts/gerar-token.ts

      - name: Get version
        id: version
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            echo "tag=v${{ github.event.inputs.version }}" >> $env:GITHUB_OUTPUT
          } else {
            $ver = (Get-Content package.json | ConvertFrom-Json).version
            echo "tag=v$ver" >> $env:GITHUB_OUTPUT
          }

      - name: Build Installer
        run: npx electron-builder --win --publish never

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "ConstruPro ERP ${{ steps.version.outputs.tag }}"
          body: "Atualizacao automatica do ConstruPro ERP"
          files: dist/ConstruPro ERP-Setup-*.exe
          make_latest: true
