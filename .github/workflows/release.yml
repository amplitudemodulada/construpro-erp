name: Publicar Release

on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      version:
        description: 'Versao (ex: 1.1.0)'
        required: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=v${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "tag=v$(date +'%Y%m%d-%H%M')" >> $GITHUB_OUTPUT
          fi

      - name: Create zip
        run: |
          mkdir -p release
          cp -r out release/
          cp version.json release/
          cp package.json release/
          cd release && zip -r ../ConstruPro-ERP-${{ steps.version.outputs.tag }}.zip .

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "ConstruPro ERP ${{ steps.version.outputs.tag }}"
          body: "Atualizacao automatica do ConstruPro ERP"
          files: ConstruPro-ERP-${{ steps.version.outputs.tag }}.zip
          make_latest: true
